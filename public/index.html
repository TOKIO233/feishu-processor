<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书文档处理工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .button.secondary {
            background: #6c757d;
            font-size: 14px;
            padding: 10px 16px;
            margin-left: 10px;
            width: auto;
        }

        .button.secondary:hover:not(:disabled) {
            background: #5a6268;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
        }

        
        .progress {
            margin: 20px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .progress.active {
            display: block;
        }

        .progress-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .status.idle { background: #ddd; }
        .status.processing { background: #ffa500; animation: pulse 1s infinite; }
        .status.success { background: #28a745; }
        .status.error { background: #dc3545; }

        .progress-text {
            flex: 1;
            color: #555;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .result.active {
            display: block;
        }

        .result.success {
            border-left: 4px solid #28a745;
        }

        .result.error {
            border-left: 4px solid #dc3545;
        }

        .result h3 {
            margin-bottom: 12px;
            color: #333;
        }

        .result p {
            color: #666;
            margin-bottom: 8px;
        }

        .result a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .result a:hover {
            text-decoration: underline;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 飞书文档处理工具</h1>

        <div class="input-group">
            <label for="url">飞书文档URL</label>
            <input
                type="url"
                id="url"
                placeholder="https://feishu.cn/docx/..."
                autocomplete="off"
            >
        </div>

        
        <button class="button" id="processBtn" onclick="startProcessing()">
            开始处理
        </button>

        <div class="progress" id="progress">
            <div class="progress-item">
                <div class="status idle" id="downloadStatus"></div>
                <div class="progress-text" id="downloadText">等待开始...</div>
            </div>
            <div class="progress-item">
                <div class="status idle" id="imageStatus"></div>
                <div class="progress-text" id="imageText">等待下载完成...</div>
            </div>
        </div>

        <div class="result" id="result">
            <h3 id="resultTitle">处理完成</h3>
            <p id="resultMessage"></p>
            <p id="resultFiles"></p>
        </div>
    </div>

    <script>
        function startProcessing() {
            const url = document.getElementById('url').value.trim();
            const btn = document.getElementById('processBtn');
            const progress = document.getElementById('progress');
            const result = document.getElementById('result');

            if (!url) {
                showMessage('请输入飞书文档URL', 'error');
                return;
            }

            // 验证URL格式
            if (!url.includes('feishu.cn')) {
                showMessage('请输入有效的飞书文档URL', 'error');
                return;
            }

            // 禁用按钮，显示进度
            btn.disabled = true;
            btn.textContent = '处理中...';
            progress.classList.add('active');
            // 清除之前的错误状态
            result.classList.remove('active');

            // 重置状态
            resetProgress();

            // 开始处理
            processDocument(url);
        }

        async function processDocument(url) {
            try {
                // 第一步：下载文档
                updateStatus('download', 'processing', '正在下载飞书文档...');
                updateStatus('image', 'idle', '等待下载完成...');

                const downloadResponse = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                if (!downloadResponse.ok) {
                    const errorData = await downloadResponse.json();
                    throw new Error(errorData.details || errorData.error || '下载失败');
                }

                const downloadData = await downloadResponse.json();

                if (downloadData.success) {
                    // 下载完成，立即显示成功状态
                    updateStatus('download', 'success', '✓ 文档下载完成');
                    console.log('✅ 文档下载完成:', downloadData.filePath);

                    // 第二步：处理图片上传
                    updateStatus('image', 'processing', '正在处理图片上传...');

                    const uploadResponse = await fetch('/api/upload', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            filePath: downloadData.filePath,
                            outputDir: null // 使用默认输出目录
                        })
                    });

                    if (!uploadResponse.ok) {
                        const errorData = await uploadResponse.json();
                        throw new Error('图片上传失败: ' + (errorData.details || errorData.error));
                    }

                    const uploadData = await uploadResponse.json();

                    if (uploadData.success) {
                        // 图片处理成功
                        if (uploadData.successCount > 0) {
                            updateStatus('image', 'success', `✓ 图片处理完成: ${uploadData.successCount}张上传成功`);
                        } else if (uploadData.totalImages > 0) {
                            updateStatus('image', 'error', '✗ 图片上传失败');
                        } else {
                            updateStatus('image', 'success', '✓ 无需处理图片');
                        }

                        // 显示最终成功结果，合并下载和上传的结果
                        const finalResult = {
                            success: true,
                            download: downloadData,
                            upload: uploadData
                        };
                        showSuccessResult(finalResult);
                    } else {
                        throw new Error('图片处理失败');
                    }
                } else {
                    throw new Error(downloadData.error || '下载失败');
                }

            } catch (error) {
                console.error('处理失败:', error);
                updateStatus('download', 'error', '✗ 处理失败');
                updateStatus('image', 'error', '');
                showErrorResult(error.message);
            } finally {
                // 恢复按钮
                const btn = document.getElementById('processBtn');
                btn.disabled = false;
                btn.textContent = '开始处理';
            }
        }

        function updateStatus(type, status, text) {
            const statusEl = document.getElementById(`${type}Status`);
            const textEl = document.getElementById(`${type}Text`);

            statusEl.className = `status ${status}`;
            textEl.textContent = text;
        }

        function resetProgress() {
            updateStatus('download', 'idle', '等待开始...');
            updateStatus('image', 'idle', '等待下载完成...');
        }

        function showMessage(message, type, autoClear = false) {
            const result = document.getElementById('result');
            const title = document.getElementById('resultTitle');
            const messageEl = document.getElementById('resultMessage');

            result.className = `result active ${type}`;

            if (type === 'error') {
                title.textContent = '❌ 错误';
            } else if (type === 'success') {
                title.textContent = '✅ 成功';
            } else if (type === 'info') {
                title.textContent = 'ℹ️ 信息';
            } else {
                title.textContent = '✓ 提示';
            }

            messageEl.textContent = message;
            document.getElementById('resultFiles').textContent = '';

            // 对于非错误类型的消息，设置自动清除（3秒后）
            if (autoClear && type !== 'error') {
                setTimeout(() => {
                    // 只有在没有新的错误消息时才清除
                    if (!result.classList.contains('error')) {
                        result.classList.remove('active');
                    }
                }, 3000);
            }
        }

        function showSuccessResult(data) {
            const result = document.getElementById('result');
            const title = document.getElementById('resultTitle');
            const messageEl = document.getElementById('resultMessage');
            const filesEl = document.getElementById('resultFiles');

            result.className = 'result active success';
            title.textContent = '🎉 处理完成';

            if (data.upload) {
                messageEl.textContent = `成功处理 ${data.upload.totalImages}张图片，其中${data.upload.successCount}张上传成功。`;

                filesEl.innerHTML = '';

                if (data.upload.outputPath) {
                    const absolutePath = data.upload.outputPath;
                    const fileName = data.upload.newFileName || absolutePath.split(/[\\\/]/).pop();
                    const downloadUrl = `/api/download-file?path=${encodeURIComponent(absolutePath)}`;

                    const line = document.createElement('div');
                    line.style.marginBottom = '10px';

                    const label = document.createElement('strong');
                    label.textContent = '输出文件: ';
                    line.appendChild(label);

                    const link = document.createElement('a');
                    link.href = downloadUrl;
                    link.textContent = `📄 ${fileName}`;
                    link.style.marginRight = '10px';
                    link.setAttribute('download', fileName);
                    line.appendChild(link);

                    const copyPathBtn = document.createElement('button');
                    copyPathBtn.className = 'button secondary';
                    copyPathBtn.textContent = '📋 复制路径';
                    copyPathBtn.addEventListener('click', () => copyFilePath(absolutePath));
                    line.appendChild(copyPathBtn);

                    const copyContentBtn = document.createElement('button');
                    copyContentBtn.className = 'button secondary';
                    copyContentBtn.textContent = '📋 复制内容';
                    copyContentBtn.addEventListener('click', () => copyToClipboard(absolutePath, fileName));
                    line.appendChild(copyContentBtn);

                    const tip = document.createElement('div');
                    tip.style.fontSize = '14px';
                    tip.style.color = '#666';
                    tip.style.marginTop = '5px';
                    tip.textContent = '💡 提示：点击文件名直接下载到本地，复制按钮用于复制路径或内容';

                    filesEl.appendChild(line);
                    filesEl.appendChild(tip);
                } else {
                    filesEl.textContent = `输出文件: ${data.upload.newFileName || '处理完成'}`;
                }
            } else {
                messageEl.textContent = '文档处理完成';
                filesEl.innerHTML = '';
            }
        }

        function showErrorResult(message) {
            showMessage(message, 'error');
        }

        // 显示复制成功的临时提示（不改变原界面）
        function showCopySuccessMessage(message) {
            // 创建临时的成功提示元素
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 12px 20px;
                border-radius: 6px;
                box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
                font-size: 14px;
                font-weight: 500;
                z-index: 10000;
                opacity: 0;
                transition: opacity 0.3s ease;
                max-width: 300px;
            `;
            toast.textContent = message;

            // 添加到页面
            document.body.appendChild(toast);

            // 显示动画
            setTimeout(() => {
                toast.style.opacity = '1';
            }, 100);

            // 2秒后消失
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        document.body.removeChild(toast);
                    }
                }, 300);
            }, 2000);
        }

        async function copyText(text) {
            if (!text) {
                throw new Error('复制内容为空');
            }

            if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                try {
                    await navigator.clipboard.writeText(text);
                    return;
                } catch (err) {
                    console.warn('Clipboard API失败，回退到execCommand:', err);
                }
            }

            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            textArea.style.pointerEvents = 'none';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            const ok = document.execCommand('copy');
            document.body.removeChild(textArea);
            if (!ok) {
                throw new Error('浏览器不支持自动复制，请手动复制');
            }
        }

        // 复制文件路径到剪贴板
        async function copyFilePath(filePath) {
            try {
                // 验证文件路径
                if (!filePath) {
                    throw new Error('文件路径为空');
                }

                // 转换路径格式用于显示
                const normalizedPath = filePath.replace(/\\\\/g, '\\').replace(/\\'/g, "'");

                // 复制到剪贴板
                await copyText(normalizedPath);

                // 显示临时的成功提示
                showCopySuccessMessage('✅ 文件路径已复制到剪贴板！');
                console.log('✅ 文件路径已复制到剪贴板');

            } catch (error) {
                console.error('复制路径失败:', error);

                // 只显示简单的错误提示，不改变原界面
                if (error.name === 'NotAllowedError') {
                    alert('❌ 剪贴板访问被拒绝，请手动复制文件路径');
                } else {
                    alert('❌ 复制路径失败: ' + error.message);
                }
            }
        }

        // 复制文件内容到剪贴板
        async function copyToClipboard(filePath, fileName) {
            try {
                // 验证文件路径
                if (!filePath) {
                    throw new Error('文件路径为空');
                }

                console.log('尝试复制文件:', filePath, fileName); // 调试信息

                // 调用后端API读取文件
                const response = await fetch('/api/read-file', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filePath })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '读取文件失败');
                }

                const { content } = await response.json();

                // 复制到剪贴板
                await copyText(content);

                // 显示临时的成功提示
                showCopySuccessMessage('✅ 文件内容已复制到剪贴板！');
                console.log(`✅ ${fileName} 的内容已复制到剪贴板`);

            } catch (error) {
                console.error('复制失败:', error);
                console.error('文件路径:', filePath); // 调试信息

                // 只显示简单的错误提示，不改变原界面
                if (error.name === 'NotAllowedError') {
                    alert('❌ 剪贴板访问被拒绝，请手动复制文件内容');
                } else if (error.message.includes('文件不存在')) {
                    alert('❌ 复制失败: 文件不存在，请确保文档处理成功后再尝试复制');
                } else {
                    alert('❌ 复制失败: ' + error.message);
                }
            }
        }

    
        // 导入编辑器（简化版 - 打开编辑器页面）
        function importToEditor(filePath, fileName) {
            // 打开doocs/md编辑器
            window.open('http://127.0.0.1:8800/', '_blank');
            showMessage('📝 已打开 doocs/md 编辑器，请使用"复制到剪贴板"功能获取内容', 'info');
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 自动聚焦到URL输入框
            document.getElementById('url').focus();

            // 支持回车键提交
            document.getElementById('url').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    startProcessing();
                }
            });
        });
    </script>
</body>
</html>
